<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BunzTierlist</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1a0f;--sur:#0f2115;--sur2:#132819;--sur3:#1a3020;
  --bor:rgba(255,255,255,0.07);--bor2:rgba(255,255,255,0.12);
  --txt:#e6edf3;--mut:#7a9e84;--mut2:#3a5c42;
  --acc:#4ade80;--acc2:rgba(74,222,128,0.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}

nav{background:var(--sur);border-bottom:1px solid var(--bor);position:sticky;top:0;z-index:100}
.nav-in{max-width:900px;margin:0 auto;padding:0 16px;height:52px;display:flex;align-items:center;gap:12px}
.logo{font-weight:700;font-size:16px;letter-spacing:-.3px;text-decoration:none;color:var(--txt)}
.logo span{color:var(--acc)}
.sw{flex:1;position:relative;max-width:280px;margin-left:auto}
.sw input{width:100%;background:var(--sur2);border:1px solid var(--bor2);border-radius:6px;padding:6px 10px 6px 30px;font-size:13px;color:var(--txt);outline:none;transition:border-color .15s}
.sw input:focus{border-color:var(--acc)}
.sw input::placeholder{color:var(--mut2)}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mut2);pointer-events:none;font-size:14px}
.nav-r{display:flex;gap:6px;flex-shrink:0}
.nbtn{display:flex;align-items:center;gap:5px;background:transparent;color:var(--mut);border:1px solid var(--bor2);border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.nbtn:hover{color:var(--txt)}
.nbtn.on{color:var(--acc);border-color:rgba(74,222,128,.3);background:var(--acc2)}
.addbtn{display:none;align-items:center;gap:5px;background:var(--acc);color:#0a1a0f;border:none;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .12s}
.addbtn:hover{opacity:.85}
.addbtn.show{display:flex}

.mtabs{background:var(--sur);border-bottom:1px solid var(--bor)}
.mtabs-in{max-width:900px;margin:0 auto;padding:0 16px;display:flex;overflow-x:auto;scrollbar-width:none;gap:2px}
.mtabs-in::-webkit-scrollbar{display:none}
.mtab{display:flex;align-items:center;gap:6px;padding:10px 14px;border:none;background:none;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .12s,border-color .12s}
.mtab:hover{color:var(--txt)}
.mtab.on{color:var(--txt);border-bottom-color:var(--mc,var(--acc))}

.ttabs{max-width:900px;margin:12px auto 0;padding:0 16px;display:flex;gap:4px;flex-wrap:wrap}
.ttab{padding:3px 11px;border-radius:999px;border:1px solid var(--bor2);background:transparent;font-size:12px;font-weight:600;color:var(--mut);cursor:pointer;transition:all .12s}
.ttab:hover{color:var(--txt);border-color:rgba(255,255,255,.18)}
.ttab.on{color:#0a1a0f;border-color:transparent;font-weight:700}

main{max-width:900px;margin:0 auto;padding:14px 16px 80px}

.tblock{background:var(--sur);border:1px solid var(--bor);border-radius:8px;overflow:hidden;margin-bottom:6px;opacity:0;transform:translateY(6px);animation:fadeup .25s forwards}
@keyframes fadeup{to{opacity:1;transform:none}}
.tg-hd{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--bor)}
.tpill{font-size:11px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:4px;color:#0a1a0f}
.tlabel{font-size:12px;color:var(--mut);font-weight:500}
.tcount{font-size:11px;color:var(--mut2);margin-left:auto}

.plist{display:flex;flex-direction:column}
.pc{display:flex;align-items:center;padding:0 14px;height:56px;border-bottom:1px solid var(--bor);transition:background .1s;gap:0}
.pc:last-child{border-bottom:none}
.pc:hover{background:var(--sur2)}

.prank{font-size:13px;font-weight:700;color:var(--mut2);min-width:30px;flex-shrink:0;text-align:center;font-variant-numeric:tabular-nums}
.prank.g{color:#d4a72c}.prank.s{color:#8b949e}.prank.b{color:#9a6633}

.pinfo{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;margin-left:4px}
.pname{font-size:17px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.4px;color:#ffffff}
.pdisc{font-size:12px;color:var(--mut)}

.pr{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:12px}
.tbadge{font-size:11px;font-weight:700;letter-spacing:.05em;padding:2px 8px;border-radius:4px;color:#0a1a0f}
.rmbtn{background:none;border:none;color:var(--mut2);cursor:pointer;padding:4px;border-radius:4px;display:flex;transition:color .12s;line-height:1}
.rmbtn:hover{color:#f85149}

.empty{padding:14px;font-size:12px;color:var(--mut2)}
.nores{text-align:center;padding:60px 20px;color:var(--mut);font-size:14px}
.nores big{display:block;font-size:32px;margin-bottom:8px}

.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--sur);border:1px solid var(--bor2);border-radius:10px;padding:22px 20px;width:360px;max-width:calc(100vw - 28px);box-shadow:0 24px 64px rgba(0,0,0,.6)}
.mtitle{font-size:16px;font-weight:700;margin-bottom:3px;letter-spacing:-.2px}
.msub{font-size:12px;color:var(--mut);margin-bottom:16px}
.modal label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:4px;margin-top:12px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select{width:100%;background:var(--sur2);border:1px solid var(--bor2);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--txt);outline:none;transition:border-color .15s;-webkit-appearance:none;font-family:inherit}
.modal input:focus,.modal select:focus{border-color:var(--acc)}
.modal input.err{border-color:#f85149}
.errmsg{font-size:12px;color:#f85149;margin-top:6px;min-height:14px}
.mact{display:flex;gap:7px;margin-top:18px;justify-content:flex-end}
.btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:opacity .12s;font-family:inherit}
.btn:hover{opacity:.8}
.bg{background:var(--sur3);color:var(--txt)}
.bp{background:var(--acc);color:#0a1a0f}
.bd{background:#da3633;color:#fff}
.abadge{display:inline-flex;align-items:center;gap:4px;background:var(--acc2);border:1px solid rgba(74,222,128,.25);border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--acc)}
.apanel-body{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.asec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:3px}
.arow{display:flex;align-items:center;justify-content:space-between;background:var(--sur2);border-radius:7px;padding:10px 12px}
.arow-info{font-size:13px;font-weight:600}
.arow-info span{display:block;font-size:11px;color:var(--mut);font-weight:400;margin-top:1px}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <a class="logo" href="#"><span>BUNZ</span>TIERLIST</a>
    <div class="sw">
      <i class="ti ti-search si" aria-hidden="true"></i>
      <input type="text" id="sInput" placeholder="Search player..." oninput="renderAll()">
    </div>
    <div class="nav-r">
      <button class="nbtn" id="adminBtn" onclick="openAdminGate()">
        <i class="ti ti-lock" aria-hidden="true" style="font-size:13px"></i>
        <span id="adminLbl">Admin</span>
      </button>
      <button class="addbtn" id="addBtn" onclick="openAdd()">
        <i class="ti ti-plus" aria-hidden="true" style="font-size:13px"></i>
        Add
      </button>
    </div>
  </div>
</nav>

<div class="mtabs"><div class="mtabs-in" id="modeTabs"></div></div>
<div class="ttabs" id="tierTabs"></div>
<main id="main"></main>

<!-- Login -->
<div class="ov" id="loginOv">
  <div class="modal">
    <div class="mtitle">Admin login</div>
    <div class="msub">Enter the admin password to manage players.</div>
    <label>Password</label>
    <input type="password" id="pwInput" placeholder="••••••••" autocomplete="off">
    <div class="errmsg" id="pwErr"></div>
    <div class="mact">
      <button class="btn bg" onclick="closeOv('loginOv')">Cancel</button>
      <button class="btn bp" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<!-- Add Player -->
<div class="ov" id="addOv">
  <div class="modal">
    <div class="mtitle">Add player</div>
    <div class="msub"><span class="abadge"><i class="ti ti-shield" style="font-size:11px" aria-hidden="true"></i> Admin</span></div>
    <label>Minecraft username</label>
    <input type="text" id="pName" placeholder="Notch" autocomplete="off">
    <label>Mode</label>
    <select id="pMode"></select>
    <label>Tier</label>
    <select id="pTier"></select>
    <label>Discord <span style="font-size:10px;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
    <input type="text" id="pDisc" placeholder="user#0000">
    <div class="mact">
      <button class="btn bg" onclick="closeOv('addOv')">Cancel</button>
      <button class="btn bp" onclick="doAdd()">Add player</button>
    </div>
  </div>
</div>

<!-- Admin Panel -->
<div class="ov" id="panelOv">
  <div class="modal">
    <div class="mtitle">Admin panel</div>
    <div class="msub"><span class="abadge"><i class="ti ti-shield" style="font-size:11px" aria-hidden="true"></i> Logged in as admin</span></div>
    <div class="apanel-body">
      <div>
        <div class="asec">Session</div>
        <div class="arow">
          <div class="arow-info">Administrator<span>Full access to add & remove players</span></div>
          <button class="btn bd" onclick="doLogout()">Logout</button>
        </div>
      </div>
      <div>
        <div class="asec">Quick actions</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn bp" onclick="closeOv('panelOv');openAdd()">+ Add player</button>
          <button class="btn bg" onclick="closeOv('panelOv')">Close</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var PW='AlexanderStrydom';
var isAdmin=false;

var MODES=[
  {id:'crystal',label:'Crystal',icon:'💎',color:'#4ade80'},
  {id:'mace',label:'Mace',icon:'🔨',color:'#e8824a'},
  {id:'sword',label:'Sword',icon:'⚔️',color:'#e84a4a'},
  {id:'axe',label:'Axe',icon:'🪓',color:'#a3e635'},
  {id:'uhc',label:'UHC',icon:'❤️',color:'#f0c35b'},
  {id:'pot',label:'Pot',icon:'🧪',color:'#bc8cff'},
];

var TIERS=[
  {id:'HT1',label:'High Tier 1',color:'#f0c35b'},
  {id:'LT1',label:'Low Tier 1',color:'#d4a72c'},
  {id:'HT2',label:'High Tier 2',color:'#bc8cff'},
  {id:'LT2',label:'Low Tier 2',color:'#8957e5'},
  {id:'HT3',label:'High Tier 3',color:'#4ade80'},
  {id:'LT3',label:'Low Tier 3',color:'#16a34a'},
  {id:'HT4',label:'High Tier 4',color:'#38bdf8'},
  {id:'LT4',label:'Low Tier 4',color:'#0284c7'},
  {id:'HT5',label:'High Tier 5',color:'#94a3b8'},
  {id:'LT5',label:'Low Tier 5',color:'#475569'},
];

var players={
  crystal:[
    {name:'Xen_',tier:'HT1',discord:'xen#0001'},
    {name:'Pyrox',tier:'HT1',discord:'pyrox#4412'},
    {name:'Veltrix',tier:'LT1',discord:''},
    {name:'Kaze',tier:'HT2',discord:'kaze#2209'},
    {name:'Crux',tier:'LT2',discord:'crux#8831'},
  ],
  mace:[],sword:[],axe:[],uhc:[],pot:[]
};

var curMode='crystal';
var curTier='ALL';

var pmSel=document.getElementById('pMode');
MODES.forEach(function(m){var o=document.createElement('option');o.value=m.id;o.textContent=m.label;pmSel.appendChild(o);});
var ptSel=document.getElementById('pTier');
TIERS.forEach(function(t){var o=document.createElement('option');o.value=t.id;o.textContent=t.id+' — '+t.label;ptSel.appendChild(o);});

function rc(r){return r===1?'g':r===2?'s':r===3?'b':'';}

function renderModeTabs(){
  var h='';
  MODES.forEach(function(m){
    var a=curMode===m.id;
    h+='<button class="mtab'+(a?' on':'')+'" style="'+(a?'--mc:'+m.color+';color:'+m.color:'')+';" onclick="setMode(\''+m.id+'\')">'
      +m.icon+' '+m.label+'</button>';
  });
  document.getElementById('modeTabs').innerHTML=h;
}

function setMode(id){curMode=id;curTier='ALL';renderModeTabs();renderTierTabs();renderAll();}

function renderTierTabs(){
  var mc=MODES.find(function(m){return m.id===curMode;});
  var h='<button class="ttab'+(curTier==='ALL'?' on':'')+'" style="'+(curTier==='ALL'?'background:'+mc.color+';color:#0a1a0f':'')+'" onclick="setTier(\'ALL\')">All</button>';
  TIERS.forEach(function(t){
    var a=curTier===t.id;
    h+='<button class="ttab'+(a?' on':'')+'" style="'+(a?'background:'+t.color+';color:#0a1a0f':'')+'" onclick="setTier(\''+t.id+'\')">'+t.id+'</button>';
  });
  document.getElementById('tierTabs').innerHTML=h;
}

function setTier(id){curTier=id;renderTierTabs();renderAll();}

function renderAll(){
  var q=document.getElementById('sInput').value.toLowerCase().trim();
  var mp=players[curMode]||[];
  var ts=curTier==='ALL'?TIERS:TIERS.filter(function(t){return t.id===curTier;});
  var html='';var any=false;

  ts.forEach(function(tier,gi){
    var tp=mp.filter(function(p){return p.tier===tier.id;});
    if(q) tp=tp.filter(function(p){return p.name.toLowerCase().indexOf(q)>-1||(p.discord&&p.discord.toLowerCase().indexOf(q)>-1);});
    if(!isAdmin&&tp.length===0&&curTier==='ALL') return;
    if(q&&tp.length===0) return;
    any=true;

    var cards=tp.length===0
      ?'<div class="empty">No players in '+tier.id+' yet'+(isAdmin?' — tap Add above':'')+'</div>'
      :tp.map(function(p,i){
          var safeName=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          var rmHtml=isAdmin
            ?'<button class="rmbtn" onclick="doRemove(\''+curMode+'\',\''+safeName+'\')" aria-label="Remove '+p.name+'">'
              +'<i class="ti ti-x" style="font-size:14px" aria-hidden="true"></i></button>'
            :'';
          return '<div class="pc">'
            +'<span class="prank '+rc(i+1)+'">'+(i+1)+'</span>'
            +'<div class="pinfo">'
            +'<span class="pname">'+p.name+'</span>'
            +(p.discord?'<span class="pdisc">'+p.discord+'</span>':'')
            +'</div>'
            +'<div class="pr">'
            +'<span class="tbadge" style="background:'+tier.color+'">'+tier.id+'</span>'
            +rmHtml
            +'</div>'
            +'</div>';
        }).join('');

    html+='<div class="tblock" style="animation-delay:'+(gi*.04)+'s">'
      +'<div class="tg-hd">'
      +'<span class="tpill" style="background:'+tier.color+'">'+tier.id+'</span>'
      +'<span class="tlabel">'+tier.label+'</span>'
      +'<span class="tcount">'+tp.length+' player'+(tp.length!==1?'s':'')+'</span>'
      +'</div>'
      +'<div class="plist">'+cards+'</div>'
      +'</div>';
  });

  if(!any){
    var cm=MODES.find(function(m){return m.id===curMode;});
    html=q
      ?'<div class="nores"><big>🔍</big>No results for "'+q+'"</div>'
      :'<div class="nores"><big>'+cm.icon+'</big>No players added yet</div>';
  }
  document.getElementById('main').innerHTML=html;
}

function openAdminGate(){
  if(isAdmin){openOv('panelOv');return;}
  document.getElementById('pwInput').value='';
  document.getElementById('pwErr').textContent='';
  document.getElementById('pwInput').classList.remove('err');
  openOv('loginOv');
  setTimeout(function(){document.getElementById('pwInput').focus();},80);
}

function doLogin(){
  var pw=document.getElementById('pwInput').value;
  if(pw===PW){
    isAdmin=true;closeOv('loginOv');
    document.getElementById('adminBtn').classList.add('on');
    document.getElementById('adminLbl').textContent='Admin ✦';
    document.getElementById('addBtn').classList.add('show');
    renderAll();openOv('panelOv');
  } else {
    document.getElementById('pwErr').textContent='Incorrect password.';
    document.getElementById('pwInput').classList.add('err');
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
  }
}

function doLogout(){
  isAdmin=false;closeOv('panelOv');
  document.getElementById('adminBtn').classList.remove('on');
  document.getElementById('adminLbl').textContent='Admin';
  document.getElementById('addBtn').classList.remove('show');
  renderAll();
}

function openAdd(){
  if(!isAdmin) return;
  document.getElementById('pMode').value=curMode;
  document.getElementById('pName').value='';
  document.getElementById('pDisc').value='';
  openOv('addOv');
  setTimeout(function(){document.getElementById('pName').focus();},80);
}

function doAdd(){
  var name=document.getElementById('pName').value.trim();
  var mode=document.getElementById('pMode').value;
  var tier=document.getElementById('pTier').value;
  var disc=document.getElementById('pDisc').value.trim();
  if(!name){document.getElementById('pName').focus();return;}
  players[mode].push({name:name,tier:tier,discord:disc});
  curMode=mode;curTier='ALL';
  closeOv('addOv');renderModeTabs();renderTierTabs();renderAll();
}

function doRemove(mode,name){
  var idx=players[mode].findIndex(function(p){return p.name===name;});
  if(idx>-1){players[mode].splice(idx,1);renderAll();}
}

function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}

['loginOv','addOv','panelOv'].forEach(function(id){
  document.getElementById(id).addEventListener('click',function(e){if(e.target===e.currentTarget)closeOv(id);});
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape')['loginOv','addOv','panelOv'].forEach(function(id){closeOv(id);});
  if(e.key==='Enter'&&document.getElementById('loginOv').classList.contains('open'))doLogin();
});

renderModeTabs();renderTierTabs();renderAll();
</script>
</body>
</html>
